<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Intuitive TCAV workflow</title>
  <desc id="desc">Diagram showing how TCAV learns a concept direction from positive and negative examples, projects activations into concept space, and measures whether the target logit increases along that concept direction.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .card { fill: #ffffff; stroke: #d7e0ea; stroke-width: 1.4; }
      .soft { fill: #e7f6f3; stroke: #9ed8ce; stroke-width: 1.3; }
      .warn { fill: #fff6dc; stroke: #e8bf65; stroke-width: 1.3; }
      .ink { fill: #172033; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #607083; font-family: Inter, Arial, sans-serif; }
      .title { font-size: 31px; font-weight: 700; }
      .h { font-size: 19px; font-weight: 700; }
      .p { font-size: 15px; }
      .small { font-size: 13px; }
      .mono { font-family: Consolas, Menlo, monospace; font-size: 15px; fill: #163f3a; }
      .arrow { stroke: #2e8f84; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .thin { stroke: #9aabbd; stroke-width: 1.5; fill: none; }
      .axis { stroke: #74869a; stroke-width: 1.4; }
      .pos { fill: #2e8f84; }
      .neg { fill: #d65f5f; }
      .blue { fill: #4d7fc6; }
      .orange { fill: #d89a2b; }
      .stripe { stroke: #172033; stroke-width: 3; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2e8f84"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760" rx="0"/>
  <text x="56" y="62" class="ink title">TCAV: from human concept to class-level sensitivity</text>
  <text x="56" y="91" class="muted p">The method does not draw a pixel heatmap. It asks whether a class score increases along a human concept direction inside the network.</text>

  <rect x="56" y="124" width="240" height="250" rx="18" class="card"/>
  <text x="78" y="158" class="ink h">1. Define a concept</text>
  <text x="78" y="184" class="muted p">Example concept: stripes</text>
  <text x="78" y="216" class="ink small">Positive examples</text>
  <g transform="translate(78 230)">
    <rect x="0" y="0" width="48" height="42" rx="8" fill="#f5f5f5" stroke="#d7e0ea"/>
    <line x1="10" y1="0" x2="10" y2="42" class="stripe"/>
    <line x1="24" y1="0" x2="24" y2="42" class="stripe"/>
    <line x1="38" y1="0" x2="38" y2="42" class="stripe"/>
    <rect x="62" y="0" width="48" height="42" rx="8" fill="#f5f5f5" stroke="#d7e0ea"/>
    <line x1="70" y1="0" x2="88" y2="42" class="stripe"/>
    <line x1="88" y1="0" x2="106" y2="42" class="stripe"/>
    <line x1="104" y1="0" x2="122" y2="42" class="stripe"/>
  </g>
  <text x="78" y="305" class="ink small">Negative examples</text>
  <g transform="translate(78 318)">
    <rect x="0" y="0" width="48" height="42" rx="8" fill="#d9b58a" stroke="#d7e0ea"/>
    <rect x="62" y="0" width="48" height="42" rx="8" fill="#8eb4d9" stroke="#d7e0ea"/>
    <circle cx="24" cy="21" r="11" fill="#c98c53"/>
    <circle cx="86" cy="21" r="11" fill="#4d7fc6"/>
  </g>

  <path d="M306 249 H382" class="arrow"/>

  <rect x="392" y="124" width="240" height="250" rx="18" class="card"/>
  <text x="414" y="158" class="ink h">2. Extract activations</text>
  <text x="414" y="184" class="muted p">Run each image through ResNet50</text>
  <text x="414" y="209" class="muted p">and collect layer activations.</text>
  <rect x="422" y="236" width="176" height="72" rx="12" class="soft"/>
  <text x="446" y="266" class="mono">z_l(x)</text>
  <text x="446" y="291" class="mono">layer3 avg pool</text>
  <g transform="translate(436 322)">
    <rect x="0" y="0" width="12" height="34" rx="3" class="blue"/>
    <rect x="20" y="10" width="12" height="24" rx="3" class="pos"/>
    <rect x="40" y="5" width="12" height="29" rx="3" class="orange"/>
    <rect x="60" y="16" width="12" height="18" rx="3" class="blue"/>
    <rect x="80" y="2" width="12" height="32" rx="3" class="pos"/>
    <rect x="100" y="20" width="12" height="14" rx="3" class="orange"/>
    <rect x="120" y="8" width="12" height="26" rx="3" class="blue"/>
  </g>

  <path d="M642 249 H718" class="arrow"/>

  <rect x="728" y="124" width="260" height="250" rx="18" class="card"/>
  <text x="750" y="158" class="ink h">3. Learn the CAV</text>
  <text x="750" y="184" class="muted p">Train a linear separator between</text>
  <text x="750" y="209" class="muted p">concept-positive and concept-negative activations.</text>
  <g transform="translate(760 232)">
    <line x1="18" y1="120" x2="190" y2="120" class="axis"/>
    <line x1="18" y1="120" x2="18" y2="16" class="axis"/>
    <line x1="74" y1="128" x2="156" y2="24" stroke="#172033" stroke-width="2"/>
    <path d="M112 92 L158 54" class="arrow"/>
    <text x="164" y="48" class="mono">v_stripes</text>
    <circle cx="50" cy="88" r="7" class="neg"/>
    <circle cx="70" cy="99" r="7" class="neg"/>
    <circle cx="86" cy="78" r="7" class="neg"/>
    <circle cx="126" cy="56" r="7" class="pos"/>
    <circle cx="146" cy="44" r="7" class="pos"/>
    <circle cx="163" cy="66" r="7" class="pos"/>
  </g>

  <path d="M998 249 H1074" class="arrow"/>

  <rect x="1084" y="124" width="140" height="250" rx="18" class="card"/>
  <text x="1104" y="158" class="ink h">4. Test class</text>
  <text x="1104" y="184" class="muted p">Does the target</text>
  <text x="1104" y="207" class="muted p">logit increase</text>
  <text x="1104" y="230" class="muted p">along the concept?</text>
  <rect x="1104" y="254" width="96" height="64" rx="12" class="warn"/>
  <text x="1115" y="282" class="mono">grad S_c</text>
  <text x="1115" y="305" class="mono">dot v_k &gt; 0</text>
  <text x="1104" y="350" class="ink small">Count positives.</text>

  <rect x="182" y="444" width="916" height="190" rx="22" class="card"/>
  <text x="218" y="486" class="ink h">Output: TCAV score</text>
  <text x="218" y="518" class="muted p">For target class tiger and concept stripes, evaluate many tiger images.</text>
  <rect x="218" y="548" width="340" height="54" rx="13" class="soft"/>
  <text x="240" y="582" class="mono">TCAV(tiger, stripes) = 28 / 30 = 0.933</text>
  <text x="600" y="562" class="ink h">Interpretation</text>
  <text x="600" y="590" class="muted p">High score: the tiger logit is often positively sensitive to the stripes direction.</text>
  <text x="600" y="616" class="muted p">Caveat: this is representation sensitivity, not a pixel-level proof.</text>

  <text x="56" y="704" class="muted small">Read TCAV as a class-level concept diagnostic: it complements saliency maps rather than replacing them.</text>
</svg>
